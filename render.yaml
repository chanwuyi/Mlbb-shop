services:
  - type: web
    name: ultra-shop-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ultra-shop-db
          property: connectionString

databases:
  - name: ultra-shop-db
    plan: free
